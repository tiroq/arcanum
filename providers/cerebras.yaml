provider:
  name: cerebras
  kind: cloud
  enabled: true

connection:
  base_url: https://api.cerebras.ai/v1
  api_key_env: CEREBRAS_API_KEY
  timeout_seconds: 45

limits:
  rpm: 30
  tpm: 0
  rpd: 0
  tpd: 0

routing:
  roles: [fast, planner, reviewer, batch, fallback]
  fallback_priority: 15
  allow_external: true

cost:
  cost_class: free
  relative_cost: 0.07

health:
  enabled: true
  reachable: true
  degraded: false

model_defaults:
  enabled: true
  capabilities: [json_mode]
  max_output_tokens: 4096
  cost:
    cost_class: free
    relative_cost: 0.07

models:
  - name: llama3.1-8b
    roles: [fast, fallback]
    capabilities: [low_latency, json_mode]
    preferred_for: [fast_tasks, cheap_review, low_latency_fallback]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.05

  - name: gpt-oss-120b
    roles: [planner, reviewer]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [balanced_heavy_reasoning, synthesis, planning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.08
    limits:
      rpm: 30
      tpm: 64000
      rpd: 14400
      tpd: 1000000

  - name: qwen-3-235b-a22b-instruct-2507
    roles: [planner, batch]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [deep_reasoning, large_synthesis, batch_planning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.10

  - name: zai-glm-4.7
    roles: [planner]
    capabilities: [json_mode, long_context]
    preferred_for: [experimental_planning, alternate_reasoning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.09

  - name: cerebras/free
    enabled: true
    roles: [fallback]
    capabilities: [json_mode]
    preferred_for: [generic_fallback]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.06