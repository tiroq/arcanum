provider:
  name: huggingface
  kind: router
  enabled: true

connection:
  base_url: https://router.huggingface.co/v1
  api_key_env: HUGGINGFACE_API_KEY
  timeout_seconds: 45

limits:
  rpm: 0
  tpm: 0
  rpd: 0
  tpd: 0

routing:
  roles: [planner, reviewer, fallback]
  fallback_priority: 70
  allow_external: true

cost:
  cost_class: free
  relative_cost: 0.20

models:
  - name: openai/gpt-oss-120b
    enabled: true
    roles: [planner]
    capabilities: [json_mode, long_context]
    preferred_for: [reasoning]
    max_output_tokens: 4096

  - name: deepseek-ai/DeepSeek-V3-0324
    enabled: true
    roles: [planner, reviewer]
    capabilities: [json_mode, long_context]
    preferred_for: [reasoning, synthesis]
    max_output_tokens: 4096