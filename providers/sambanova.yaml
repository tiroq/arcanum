provider:
  name: sambanova
  kind: cloud
  enabled: true

connection:
  base_url: https://api.sambanova.ai/v1
  api_key_env: SAMBANOVA_API_KEY
  timeout_seconds: 45

limits:
  rpm: 20
  tpm: 0
  rpd: 20
  tpd: 200000

routing:
  roles: [fast, planner, reviewer, batch, fallback]
  fallback_priority: 25
  allow_external: true

cost:
  cost_class: free
  relative_cost: 0.12

health:
  enabled: true
  reachable: true
  degraded: false

model_defaults:
  enabled: true
  capabilities: [json_mode]
  max_output_tokens: 4096
  cost:
    cost_class: free
    relative_cost: 0.12

models:
  - name: llama-3.1-8b
    roles: [fast, fallback]
    capabilities: [low_latency, json_mode]
    preferred_for: [fast_tasks, cheap_reasoning, low_latency_fallback]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.08

  - name: llama-3.3-70b
    roles: [reviewer]
    capabilities: [json_mode, structured_output]
    preferred_for: [review, summarization, balanced_reasoning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.12

  - name: deepseek
    roles: [planner, batch]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [deep_reasoning, synthesis, batch_processing]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.14

  - name: sambanova/free
    enabled: true
    roles: [fallback]
    capabilities: [json_mode]
    preferred_for: [generic_fallback]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.10