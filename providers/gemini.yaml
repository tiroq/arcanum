provider:
  name: gemini
  kind: cloud
  enabled: true

connection:
  base_url: https://generativelanguage.googleapis.com/v1beta/openai
  api_key_env: GEMINI_API_KEY
  timeout_seconds: 45

limits:
  rpm: 15
  tpm: 20000
  rpd: 100
  tpd: 500000

routing:
  roles: [planner, reviewer, batch, fast]
  fallback_priority: 30
  allow_external: true

cost:
  cost_class: free
  relative_cost: 0.10

health:
  enabled: true
  reachable: true
  degraded: false

model_defaults:
  enabled: true
  capabilities: [json_mode]
  max_output_tokens: 4096
  cost:
    cost_class: free
    relative_cost: 0.10

models:
  # --- FAST LAYER (low latency) ---
  - name: gemini-2.0-flash
    roles: [fast]
    capabilities: [low_latency, json_mode]
    preferred_for: [cheap_fast_tasks, short_responses]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.08

  - name: gemini-2.5-flash
    roles: [fast, reviewer]
    capabilities: [low_latency, json_mode, long_context]
    preferred_for: [fast_reasoning, review, medium_tasks]
    cost:
      cost_class: free
      relative_cost: 0.09

  # --- BALANCED / REVIEW ---
  - name: gemini-2.5-flash-lite
    enabled: true
    roles: [reviewer, batch]
    capabilities: [json_mode, long_context]
    preferred_for: [batch_processing, cost_sensitive_tasks]
    max_output_tokens: 4096
    cost:
      cost_class: cheap
      relative_cost: 0.07

  # --- HEAVY REASONING ---
  - name: gemini-2.5-pro
    roles: [planner, reviewer]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [heavy_reasoning, planning, synthesis]
    max_output_tokens: 8192
    cost:
      cost_class: cheap
      relative_cost: 0.15

  # --- FALLBACK SAFETY ---
  - name: gemini-default
    enabled: true
    roles: [fallback]
    capabilities: [json_mode]
    preferred_for: [generic_fallback]
    max_output_tokens: 2048