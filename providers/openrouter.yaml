provider:
  name: openrouter
  kind: router
  enabled: true

connection:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  timeout_seconds: 45

limits:
  rpm: 20
  rpd: 50

routing:
  roles: [planner, reviewer, fallback]
  fallback_priority: 100
  allow_external: true

cost:
  cost_class: free
  relative_cost: 0.15

health:
  enabled: true
  reachable: true
  degraded: false

models:

  # 🔴 HEAVY PLANNER (primary)
  - name: openai/gpt-oss-120b:free
    enabled: true
    roles: [planner]
    capabilities: [json_mode, long_context]
    preferred_for: [deep_reasoning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.12

  - name: qwen/qwen3-32b:free
    enabled: true
    roles: [planner]
    capabilities: [json_mode, long_context]
    preferred_for: [structured_reasoning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.09

  # 🟡 REVIEW / MID-TIER
  - name: meta-llama/llama-3.3-70b-instruct:free
    enabled: true
    roles: [reviewer]
    capabilities: [json_mode, long_context]
    preferred_for: [review, summarization]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.11

  - name: mistralai/mixtral-8x7b
    enabled: true
    roles: [reviewer]
    capabilities: [json_mode]
    preferred_for: [cheap_review]
    max_output_tokens: 4096

  # 🟢 FALLBACK (cheap + stable)
  - name: openrouter/free
    enabled: true
    roles: [fallback]
    capabilities: [json_mode]
    preferred_for: [generic_fallback]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.10

  - name: openai/gpt-oss-20b:free
    enabled: true
    roles: [fallback]
    capabilities: [json_mode]
    preferred_for: [light_tasks]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.08