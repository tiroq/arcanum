provider:
  name: openrouter
  kind: router
  enabled: true

connection:
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
  timeout_seconds: 45

limits:
  rpm: 20
  tpm: 0
  rpd: 50
  tpd: 0

routing:
  roles: [planner, reviewer, fallback]
  fallback_priority: 90
  allow_external: true

cost:
  cost_class: free
  relative_cost: 0.10

models:
  - name: openrouter/free
    enabled: true
    roles: [planner, reviewer, fallback]
    capabilities: [json_mode, long_context]
    preferred_for: [free_fallback, mixed_reasoning]
    max_output_tokens: 4096