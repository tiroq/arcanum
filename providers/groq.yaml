provider:
  name: groq
  kind: cloud
  enabled: true

connection:
  base_url: https://api.groq.com/openai/v1
  api_key_env: GROQ_API_KEY
  timeout_seconds: 30

limits:
  rpm: 30
  tpm: 0
  rpd: 0
  tpd: 0

routing:
  roles: [fast, planner, reviewer, fallback]
  fallback_priority: 20
  allow_external: true

cost:
  cost_class: free
  relative_cost: 0.08

health:
  enabled: true
  reachable: true
  degraded: false

model_defaults:
  enabled: true
  capabilities: [json_mode]
  max_output_tokens: 4096
  cost:
    cost_class: free
    relative_cost: 0.08

models:
  - name: llama-3.1-8b-instant
    roles: [fast, fallback]
    capabilities: [low_latency, json_mode]
    preferred_for: [fast_generation, classification, cheap_reasoning, low_latency_fallback]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.06
    limits:
      rpm: 30
      tpm: 6000
      rpd: 14400
      tpd: 500000

  - name: llama-3.3-70b-versatile
    roles: [reviewer]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [review, summarization, balanced_reasoning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.09
    limits:
      rpm: 30
      tpm: 12000
      rpd: 1000
      tpd: 100000

  - name: qwen/qwen3-32b
    roles: [planner]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [structured_reasoning, synthesis, planning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.08

  - name: openai/gpt-oss-120b
    roles: [planner]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [deep_reasoning, heavy_planning]
    max_output_tokens: 4096
    cost:
      cost_class: free
      relative_cost: 0.12

  - name: groq/free
    enabled: true
    roles: [fallback]
    capabilities: [json_mode]
    preferred_for: [generic_fallback]
    max_output_tokens: 2048
    cost:
      cost_class: free
      relative_cost: 0.07