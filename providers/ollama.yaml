provider:
  name: ollama
  kind: local
  enabled: true

connection:
  base_url: http://localhost:11434
  timeout_seconds: 300   # increased: allow long-running local inference

limits:
  rpm: 0
  tpm: 0
  rpd: 0
  tpd: 0

routing:
  roles: [fast, planner, reviewer, batch, fallback]
  fallback_priority: 95   # still last, but usable as reliable executor
  allow_external: false

cost:
  cost_class: local
  relative_cost: 0.0

health:
  enabled: true
  reachable: true
  degraded: false

model_defaults:
  enabled: true
  capabilities: [json_mode]
  max_output_tokens: 8192   # increased for long completions
  cost:
    cost_class: local
    relative_cost: 0.0

models:
  - name: qwen3:1.7b
    roles: [fast]
    capabilities: [json_mode, low_latency]
    preferred_for: [fast_tasks, classification, short_generation]
    max_output_tokens: 4096

  - name: qwen2.5:7b-instruct
    roles: [planner, reviewer]
    capabilities: [json_mode, long_context, structured_output]
    preferred_for: [planning, reasoning, reliable_execution, fallback_heavy]
    max_output_tokens: 8192

  - name: llama3.2:3b
    roles: [batch, fallback]
    capabilities: [json_mode]
    preferred_for: [long_running_tasks, batch_processing, guaranteed_completion]
    max_output_tokens: 8192

  - name: ollama/default
    enabled: true
    roles: [fallback]
    capabilities: [json_mode]
    preferred_for: [ultimate_local_fallback]
    max_output_tokens: 4096

# Execution profiles define per-role ordered model candidate chains for local execution.
# Each candidate specifies which model to try (in order), its thinking mode,
# per-candidate timeout, and whether to request JSON output.
# These settings replace MODEL_*_PROFILE and OLLAMA_*_PROFILE env vars.
execution_profiles:
  default:
    - model: qwen3:1.7b
      think: off
      timeout_seconds: 120

  fast:
    - model: qwen3:1.7b
      think: off
      timeout_seconds: 60

  planner:
    - model: qwen3:8b
      think: on
      timeout_seconds: 240
    - model: qwen3:8b
      think: off
      timeout_seconds: 180
    - model: qwen3:1.7b
      think: on
      timeout_seconds: 150

  review:
    - model: qwen3:1.7b
      think: off
      json_mode: true
      timeout_seconds: 120
    - model: qwen3:1.7b
      think: on
      json_mode: true
      timeout_seconds: 180