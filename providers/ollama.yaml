provider:
  name: ollama
  kind: local
  enabled: true

connection:
  base_url: http://localhost:11434
  timeout_seconds: 120

limits:
  rpm: 0
  tpm: 0
  rpd: 0
  tpd: 0

routing:
  roles: [fast, planner, reviewer, batch, fallback]
  fallback_priority: 100
  allow_external: false

cost:
  cost_class: local
  relative_cost: 0.0

health:
  enabled: true
  reachable: true
  degraded: false

model_defaults:
  enabled: true
  capabilities: [json_mode]
  max_output_tokens: 4096
  cost:
    cost_class: local
    relative_cost: 0.0

models:
  - name: qwen3:1.7b
    roles: [fast]
    capabilities: [json_mode, low_latency]
    preferred_for: [fast_tasks, classification, lightweight_generation]
    max_output_tokens: 4096

  - name: qwen2.5:7b-instruct
    roles: [planner, reviewer]
    capabilities: [json_mode]
    preferred_for: [planning, reasoning, structured_tasks]
    max_output_tokens: 8192

  - name: llama3.2:3b
    roles: [fast, batch, fallback]
    capabilities: [json_mode, low_latency]
    preferred_for: [batch_processing, cheap_fallback, parallel_tasks]
    max_output_tokens: 4096